# DigitalOcean App Platform (optional — Droplet + Nginx is the primary path in DIGITALOCEAN_DEPLOY.md)
#
# This spec runs the API only. Static HTML/CSS/JS is best served from the same Droplet via Nginx,
# or attach a separate Static Site component pointing at the repo root.
#
# Docs: https://docs.digitalocean.com/products/app-platform/reference/app-spec/

name: hmherbs
region: nyc

databases:
  - name: hmherbs-db
    engine: MYSQL
    version: "8"
    production: true

services:
  - name: api
    github:
      repo: YOUR_GITHUB_USER/hmherbs
      branch: main
      deploy_on_push: true
    source_dir: /backend
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 3001
    routes:
      - path: /api
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: DB_HOST
        scope: RUN_TIME
        value: ${hmherbs-db.HOSTNAME}
      - key: DB_PORT
        scope: RUN_TIME
        value: ${hmherbs-db.PORT}
      - key: DB_USER
        scope: RUN_TIME
        value: ${hmherbs-db.USERNAME}
      - key: DB_PASSWORD
        scope: RUN_TIME
        value: ${hmherbs-db.PASSWORD}
      - key: DB_NAME
        scope: RUN_TIME
        value: ${hmherbs-db.DATABASE}
      - key: FRONTEND_URL
        scope: RUN_TIME
        value: https://YOUR_DOMAIN.com

