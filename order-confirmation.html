<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Order Confirmation — H&amp;M Herbs &amp; Vitamins</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="css/mobile-enhancements.css">
    <style>
        .confirmation-page {
            min-height: 70vh;
            background: var(--gray-50, #f9fafb);
            padding: var(--space-8, 2rem) var(--space-4, 1rem);
        }

        .confirmation-card {
            max-width: 640px;
            margin: 0 auto;
            background: var(--white, #fff);
            border-radius: var(--radius-xl, 12px);
            padding: var(--space-8, 2rem);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.08);
            text-align: center;
        }

        .confirmation-icon {
            width: 4rem;
            height: 4rem;
            margin: 0 auto var(--space-4, 1rem);
            border-radius: 50%;
            background: #dcfce7;
            color: var(--primary-green, #2d5a27);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
        }

        .confirmation-card h1 {
            font-family: var(--font-display, Georgia, serif);
            color: var(--primary-green, #2d5a27);
            font-size: var(--text-2xl, 1.5rem);
            margin-bottom: var(--space-2, 0.5rem);
        }

        .confirmation-lead {
            color: var(--gray-600, #4b5563);
            margin-bottom: var(--space-6, 1.5rem);
            line-height: 1.6;
        }

        .confirmation-details {
            text-align: left;
            background: var(--gray-50, #f9fafb);
            border-radius: var(--radius-lg, 8px);
            padding: var(--space-5, 1.25rem);
            margin-bottom: var(--space-6, 1.5rem);
        }

        .confirmation-details dl {
            display: grid;
            grid-template-columns: 1fr 1.4fr;
            gap: 0.5rem 1rem;
            margin: 0;
        }

        .confirmation-details dt {
            font-weight: 600;
            color: var(--gray-700, #374151);
            margin: 0;
        }

        .confirmation-details dd {
            margin: 0;
            color: var(--gray-900, #111827);
            word-break: break-word;
        }

        .tracking-highlight {
            font-family: ui-monospace, monospace;
            font-weight: 600;
            color: var(--primary-green, #2d5a27);
        }

        .confirmation-items {
            text-align: left;
            margin-top: var(--space-4, 1rem);
            border-top: 1px solid var(--gray-200, #e5e7eb);
            padding-top: var(--space-4, 1rem);
        }

        .confirmation-items h2 {
            font-size: var(--text-base, 1rem);
            margin-bottom: var(--space-3, 0.75rem);
            color: var(--gray-800, #1f2937);
        }

        .confirmation-item-row {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.35rem 0;
            font-size: var(--text-sm, 0.875rem);
            color: var(--gray-700, #374151);
        }

        .confirmation-actions {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-3, 0.75rem);
            justify-content: center;
        }

        .confirmation-actions .btn {
            min-width: 10rem;
        }

        .confirmation-pending .confirmation-icon {
            background: #fef3c7;
            color: #b45309;
        }

        .confirmation-error {
            color: var(--error, #dc2626);
        }
    </style>
</head>

<body>
    <header class="header" role="banner">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo" aria-label="H&amp;M Herbs home">
                    <i class="fas fa-leaf" aria-hidden="true"></i>
                    <span>H&amp;M Herbs</span>
                </a>
            </div>
        </div>
    </header>

    <main class="confirmation-page" id="main-content">
        <div class="confirmation-card" id="confirmation-root" aria-live="polite">
            <p>Loading your order confirmation…</p>
        </div>
    </main>

    <script src="js/order-confirmation.js" defer></script>
</body>

</html>
