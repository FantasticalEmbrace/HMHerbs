<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1f82ff">
  <title>Business One — Remote viewer</title>
  <link rel="icon" type="image/png" href="images/business-one/favicon.png">
  <link rel="stylesheet" href="css/business-one-support-desk.css?v=20260618b">
</head>
<body class="support-viewer-app">
  <div class="app-shell">
    <header class="top-bar">
      <div class="brand">
        <img src="images/business-one/logo.png" alt="Business One" class="platform-logo">
        <div>
          <h1>Remote viewer</h1>
          <small id="viewer-merchant">Connecting to register…</small>
        </div>
      </div>
      <div class="top-actions">
        <span id="status" class="viewer-status">Connecting…</span>
        <button type="button" class="btn btn-ghost" id="reload-btn">Retry</button>
        <button type="button" class="btn btn-danger" id="end-btn">End session</button>
      </div>
    </header>
    <main class="viewer-stage">
      <div class="viewer-video-wrap">
        <video id="remote-video" autoplay playsinline></video>
      </div>
    </main>
  </div>
  <script src="support-viewer.js?v=20260618b"></script>
</body>
</html>
