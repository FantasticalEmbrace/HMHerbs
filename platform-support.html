<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="application-name" content="Business One Support Desk">
  <meta name="theme-color" content="#1f82ff">
  <title>Business One — Support Desk</title>
  <link rel="icon" type="image/png" href="images/business-one/favicon.png">
  <link rel="stylesheet" href="css/business-one-support-desk.css?v=20260618e">
  <link rel="stylesheet" href="css/oauth-buttons.css">
</head>
<body class="support-desk-app">
  <div class="app-shell">
    <header class="top-bar">
      <div class="brand">
        <img src="images/business-one/logo.png" alt="Business One" class="platform-logo">
        <div>
          <h1 id="desk-title">Business One Support Desk</h1>
          <small>All merchants · one queue · no per-store admin login</small>
        </div>
      </div>
      <div class="top-actions">
        <span id="signed-in-as"></span>
        <span id="status-msg"></span>
        <button type="button" class="btn btn-ghost" id="notify-btn" title="Alert when a register requests help">Alerts</button>
        <button type="button" class="btn btn-ghost" id="reload-btn">Refresh</button>
        <button type="button" class="btn btn-ghost" id="logout-btn">Sign out</button>
      </div>
    </header>

    <div id="login-screen" class="setup-screen hidden">
      <div class="setup-card">
        <img src="images/business-one/logo.png" alt="Business One" class="b1-logo">
        <h2>Support desk sign-in</h2>
        <p id="login-tech-hint" class="setup-lead">Sign in with your Business One technician account.</p>
        <div class="form-group">
          <label for="hub-url">Support server (API base URL)</label>
          <input id="hub-url" type="url" placeholder="http://127.0.0.1:3001" value="http://127.0.0.1:3001">
          <p class="form-help">Example: <code>http://127.0.0.1:3001</code></p>
          <p id="hub-url-warning" class="form-error hidden" style="margin-top:0.5rem;"></p>
        </div>
        <div class="form-group">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" autocomplete="current-password">
        </div>
        <button type="button" class="btn btn-primary setup-submit" id="login-btn">Sign in</button>
        <div class="auth-divider hidden" id="google-login-wrap">or</div>
        <button type="button" class="btn btn-google hidden" id="google-login-btn" aria-label="Continue with Google">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
        <p id="login-error" class="form-error"></p>
      </div>
    </div>

    <main id="queue-app" class="support-desk-main hidden">
      <div class="stats">
        <div class="stat"><strong id="stat-waiting">0</strong><span>Waiting</span></div>
        <div class="stat"><strong id="stat-progress">0</strong><span>In progress</span></div>
        <div class="stat"><strong id="stat-total">0</strong><span>Total open</span></div>
      </div>

      <section class="panel">
        <h2 class="panel-header">Waiting for technician</h2>
        <div id="waiting-list"></div>
      </section>

      <section class="panel">
        <h2 class="panel-header">In progress</h2>
        <div id="progress-list"></div>
      </section>
    </main>
  </div>

  <script src="platform-support.js?v=20260618e"></script>
</body>
</html>
