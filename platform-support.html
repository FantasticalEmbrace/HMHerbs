<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Business One — Support queue</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f1f5f9;
      color: #0f172a;
    }
    header {
      background: #1e293b;
      color: #f8fafc;
      padding: 1rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    header h1 { margin: 0; font-size: 1.15rem; color: #93c5fd; }
    header p { margin: 0.15rem 0 0; font-size: 0.85rem; color: #cbd5e1; }
    main { max-width: 1100px; margin: 0 auto; padding: 1rem 1.25rem 2rem; }
    .stats {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .stat {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      min-width: 120px;
    }
    .stat strong { display: block; font-size: 1.4rem; color: #1d4ed8; }
    .stat span { font-size: 0.85rem; color: #64748b; }
    section {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      margin-bottom: 1rem;
      overflow: hidden;
    }
    section h2 {
      margin: 0;
      padding: 0.85rem 1rem;
      font-size: 0.95rem;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }
    .empty {
      padding: 1.25rem 1rem;
      color: #64748b;
      font-size: 0.92rem;
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      align-items: center;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid #f1f5f9;
    }
    .row:last-child { border-bottom: none; }
    .row-title { font-weight: 600; }
    .row-meta { font-size: 0.85rem; color: #64748b; margin-top: 0.15rem; }
    .badge {
      display: inline-block;
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .badge-pending { background: #fef3c7; color: #92400e; }
    .badge-awaiting { background: #dbeafe; color: #1e40af; }
    .badge-connecting { background: #e0e7ff; color: #3730a3; }
    .badge-active { background: #dcfce7; color: #166534; }
    .badge-offline { background: #f1f5f9; color: #64748b; }
    button, .btn {
      border: none;
      border-radius: 8px;
      padding: 0.45rem 0.85rem;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-secondary { background: #e2e8f0; color: #0f172a; }
    .toolbar { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    #status-msg { font-size: 0.88rem; color: #cbd5e1; }
    .login-card {
      max-width: 420px;
      margin: 4rem auto;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 1.5rem;
    }
    .login-card input {
      width: 100%;
      padding: 0.65rem 0.75rem;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      margin: 0.5rem 0 1rem;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Business One support queue</h1>
      <p>All merchants · all stores · oldest waiting first</p>
    </div>
    <div class="toolbar">
      <span id="status-msg"></span>
      <button type="button" class="btn-secondary" id="reload-btn">Refresh</button>
      <a class="btn-secondary btn" href="/admin.html" style="text-decoration:none;display:inline-flex;align-items:center;">Admin</a>
    </div>
  </header>

  <div id="login-screen" class="login-card hidden">
    <h2 style="margin-top:0;">Sign in</h2>
    <p style="color:#64748b;font-size:0.92rem;">Use your platform admin account for the support hub server.</p>
    <label for="login-email">Email</label>
    <input id="login-email" type="email" autocomplete="username">
    <label for="login-password">Password</label>
    <input id="login-password" type="password" autocomplete="current-password">
    <button type="button" class="btn-primary" id="login-btn" style="width:100%;">Sign in</button>
    <p id="login-error" style="color:#b91c1c;font-size:0.88rem;"></p>
  </div>

  <main id="queue-app" class="hidden">
    <div class="stats">
      <div class="stat"><strong id="stat-waiting">0</strong><span>Waiting</span></div>
      <div class="stat"><strong id="stat-progress">0</strong><span>In progress</span></div>
      <div class="stat"><strong id="stat-total">0</strong><span>Total open</span></div>
    </div>

    <section>
      <h2>Waiting for technician</h2>
      <div id="waiting-list"></div>
    </section>

    <section>
      <h2>In progress</h2>
      <div id="progress-list"></div>
    </section>
  </main>

  <script src="platform-support.js?v=20260617a"></script>
</body>
</html>
