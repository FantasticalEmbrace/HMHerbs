<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Manage EDSA Appointment — H&amp;M Herbs &amp; Vitamins</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="css/mobile-enhancements.css">
    <link rel="stylesheet" href="css/edsa-booking.css?v=8">
    <style>
        .manage-page {
            min-height: 70vh;
            background: var(--gray-50, #f9fafb);
            padding: var(--space-8, 2rem) var(--space-4, 1rem);
        }

        .manage-card {
            max-width: 640px;
            margin: 0 auto;
            background: var(--white, #fff);
            border-radius: var(--radius-xl, 12px);
            padding: var(--space-8, 2rem);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.08);
        }

        .manage-card h1 {
            font-family: var(--font-display, Georgia, serif);
            color: var(--primary-green, #2d5a27);
            font-size: var(--text-2xl, 1.5rem);
            margin-bottom: var(--space-2, 0.5rem);
            text-align: center;
        }

        .manage-lead {
            color: var(--gray-600, #4b5563);
            margin-bottom: var(--space-6, 1.5rem);
            line-height: 1.6;
            text-align: center;
        }

        .manage-details {
            background: var(--gray-50, #f9fafb);
            border-radius: var(--radius-lg, 8px);
            padding: var(--space-5, 1.25rem);
            margin-bottom: var(--space-6, 1.5rem);
        }

        .manage-details dl {
            display: grid;
            grid-template-columns: 1fr 1.4fr;
            gap: 0.5rem 1rem;
            margin: 0;
        }

        .manage-details dt {
            font-weight: 600;
            color: var(--gray-700, #374151);
        }

        .manage-details dd {
            margin: 0;
            color: var(--gray-900, #111827);
        }

        .manage-form .form-group {
            margin-bottom: var(--space-4, 1rem);
        }

        .manage-form label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.35rem;
            color: var(--gray-800, #1f2937);
        }

        .manage-form input[type="text"],
        .manage-form input[type="email"],
        .manage-form input[type="date"],
        .manage-form select,
        .manage-form textarea {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1px solid var(--gray-300, #d1d5db);
            border-radius: var(--radius-md, 6px);
            font-size: 1rem;
        }

        .request-type-group {
            margin-bottom: var(--space-5, 1.25rem);
            padding: 0;
            border: none;
        }

        .request-type-heading {
            display: block;
            font-weight: 600;
            font-size: var(--text-sm, 0.875rem);
            color: var(--gray-800, #1f2937);
            margin-bottom: var(--space-3, 0.75rem);
        }

        .request-type-choices {
            display: flex;
            flex-direction: column;
            gap: var(--space-3, 0.75rem);
        }

        .request-type-card {
            display: flex !important;
            align-items: flex-start;
            gap: var(--space-3, 0.75rem);
            width: 100%;
            margin: 0 !important;
            padding: var(--space-4, 1rem);
            border: 2px solid var(--gray-200, #e5e7eb);
            border-radius: var(--radius-lg, 8px);
            background: var(--white, #fff);
            cursor: pointer;
            text-align: left;
            font-weight: 500;
            transition: border-color 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
            box-sizing: border-box;
        }

        .request-type-card:hover {
            border-color: var(--gray-300, #d1d5db);
            background: var(--gray-50, #f9fafb);
        }

        .request-type-card:has(input:checked) {
            border-color: var(--primary-green, #2d5a27);
            background: #f0fdf4;
            box-shadow: 0 0 0 1px var(--primary-green, #2d5a27);
        }

        .request-type-card input[type="radio"] {
            width: 1.125rem;
            height: 1.125rem;
            min-width: 1.125rem;
            margin: 0.15rem 0 0;
            flex-shrink: 0;
            accent-color: var(--primary-green, #2d5a27);
            cursor: pointer;
        }

        .request-type-card-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.2rem;
            flex: 1;
            min-width: 0;
        }

        .request-type-card-title {
            font-weight: 600;
            color: var(--gray-900, #111827);
            font-size: var(--text-base, 1rem);
        }

        .request-type-card-desc {
            font-weight: 400;
            font-size: var(--text-sm, 0.875rem);
            color: var(--gray-600, #4b5563);
            line-height: 1.4;
        }

        #reschedule-fields {
            margin-top: var(--space-4, 1rem);
            padding-top: var(--space-4, 1rem);
            border-top: 1px solid var(--gray-200, #e5e7eb);
        }

        #reschedule-fields[hidden] {
            display: none;
        }

        .manage-time-slots-wrap {
            margin: 1rem 0 1.25rem;
        }

        .manage-slots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(7rem, 1fr));
            gap: 0.5rem;
        }

        .btn-danger {
            background: #b91c1c;
            color: #fff;
            border: none;
        }

        .btn-danger:hover {
            background: #991b1b;
        }

        .manage-actions {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-3, 0.75rem);
            justify-content: center;
            margin-top: var(--space-6, 1.5rem);
        }

        .manage-actions .btn {
            min-width: 10rem;
        }

        .status-banner {
            padding: 0.75rem 1rem;
            border-radius: var(--radius-lg, 8px);
            margin-bottom: var(--space-4, 1rem);
            font-size: var(--text-sm, 0.875rem);
            line-height: 1.5;
        }

        .status-banner-info {
            background: #eff6ff;
            color: #1e40af;
            border: 1px solid #bfdbfe;
        }

        .status-banner-success {
            background: #ecfdf5;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .status-banner-warning {
            background: #fffbeb;
            color: #92400e;
            border: 1px solid #fde68a;
        }

        .call-store-modal-content {
            max-width: 420px;
            width: 92%;
        }

        .call-store-modal-body {
            text-align: center;
            padding: var(--space-6, 1.5rem) var(--space-6, 1.5rem) var(--space-8, 2rem);
        }

        .call-store-lead {
            margin: 0 0 var(--space-4, 1rem);
            color: var(--gray-600, #4b5563);
            font-size: var(--text-sm, 0.875rem);
        }

        .call-store-phone-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            max-width: 280px;
            margin: 0 auto var(--space-4, 1rem);
            padding: var(--space-4, 1rem) var(--space-5, 1.25rem);
            background: var(--primary-green, #2d5a27);
            color: var(--white, #fff);
            font-size: 1.35rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: var(--radius-lg, 8px);
            box-shadow: 0 4px 12px rgba(45, 90, 39, 0.25);
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .call-store-phone-btn:hover {
            background: #234a1f;
            color: var(--white, #fff);
            transform: translateY(-1px);
        }

        .call-store-phone-btn i {
            font-size: 1.1rem;
            opacity: 0.95;
        }

        .call-store-hours {
            margin: 0 0 var(--space-3, 0.75rem);
            color: var(--gray-700, #374151);
            font-size: var(--text-sm, 0.875rem);
            line-height: 1.5;
        }

        .call-store-hint {
            margin: 0 0 var(--space-4, 1rem);
            color: var(--gray-500, #6b7280);
            font-size: 0.8125rem;
        }

        .call-store-address {
            margin: 0 0 var(--space-5, 1.25rem);
            font-size: var(--text-sm, 0.875rem);
        }

        .call-store-address a {
            color: var(--primary-green, #2d5a27);
            font-weight: 600;
        }

        .call-store-close-btn {
            min-width: 8rem;
        }

        .manage-actions .btn-outline-secondary {
            background: transparent;
            color: var(--gray-700, #374151);
            border: 1px solid var(--gray-300, #d1d5db);
        }

        .manage-actions .btn-outline-secondary:hover {
            background: var(--gray-50, #f9fafb);
        }

        .header .logo {
            display: inline-block;
            text-decoration: none;
        }

        .header .logo .logo-wordmark {
            display: block;
            max-height: 64px;
            width: auto;
            height: auto;
        }
    </style>
</head>

<body>
    <header class="header" role="banner">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo" aria-label="H&amp;M Herbs &amp; Vitamins — Home">
                    <img src="images/HM%20Herb%20Logo.png" alt="H&amp;M Herbs &amp; Vitamins" class="logo-wordmark" loading="eager" width="220" height="64">
                </a>
            </div>
        </div>
    </header>

    <main class="manage-page" id="main-content">
        <div class="manage-card" id="manage-root" aria-live="polite">
            <p class="manage-lead">Loading…</p>
        </div>
    </main>

    <script src="script.js" defer></script>
    <script src="js/edsa-ui.js?v=1" defer></script>
    <script src="js/edsa-manage-appointment.js?v=8" defer></script>
</body>

</html>
