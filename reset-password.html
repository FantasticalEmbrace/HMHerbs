<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset password — H&amp;M Herbs &amp; Vitamins</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/brand-tokens.css">
    <style>
        :root {
            --gray-300: #d1d5db;
            --gray-600: #4b5563;
            --white: #ffffff;
            --error: #dc2626;
            --success: #059669;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Inter, system-ui, sans-serif;
            background: linear-gradient(135deg, var(--brand-sidebar-from) 0%, var(--brand-sidebar-to) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .reset-container {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            width: 100%;
            max-width: 480px;
        }
        .reset-header { text-align: center; margin-bottom: 1.5rem; }
        .reset-logo {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary-green);
        }
        .reset-subtitle { color: var(--gray-600); font-size: 0.875rem; margin-top: 0.5rem; }
        .form-group { margin-bottom: 1rem; }
        .password-field { position: relative; }
        .password-field .form-input { padding-right: 2.75rem; }
        .password-toggle {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: var(--gray-600);
            cursor: pointer;
            padding: 0.35rem;
            line-height: 1;
            border-radius: 0.25rem;
        }
        .password-toggle:hover,
        .password-toggle:focus {
            color: var(--primary-green);
            outline: none;
        }
        .password-toggle:focus-visible {
            box-shadow: 0 0 0 2px rgba(45, 90, 39, 0.35);
        }
        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--gray-300);
            border-radius: 0.375rem;
            font-size: 0.875rem;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(45, 90, 39, 0.12);
        }
        .form-help { font-size: 0.75rem; color: var(--gray-600); margin-top: 0.35rem; display: block; }
        .btn {
            width: 100%;
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 0.375rem;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            background: var(--primary-green);
            color: #fff;
        }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .error-message { color: var(--error); font-size: 0.875rem; margin-bottom: 1rem; display: none; }
        .success-message { color: var(--success); font-size: 0.875rem; margin-bottom: 1rem; display: none; }
        .back-link { text-align: center; margin-top: 1.25rem; }
        .back-link a { color: var(--primary-green); font-weight: 500; }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-header">
            <div class="reset-logo"><i class="fas fa-leaf" aria-hidden="true"></i> H&amp;M Herbs</div>
            <p class="reset-subtitle">Choose a new password for your account</p>
        </div>
        <div id="errorMessage" class="error-message" role="alert"></div>
        <div id="successMessage" class="success-message" role="status"></div>
        <form id="customerResetPasswordForm">
            <div class="form-group">
                <div class="password-field">
                    <input type="password" id="newPassword" class="form-input" placeholder="New password" required autocomplete="new-password" minlength="8">
                    <button type="button" class="password-toggle" data-target="newPassword" aria-label="Show password" aria-pressed="false">
                        <i class="fas fa-eye" aria-hidden="true"></i>
                    </button>
                </div>
                <small class="form-help">8+ characters with uppercase, lowercase, number, and special character (@$!%*?&amp;)</small>
            </div>
            <div class="form-group">
                <div class="password-field">
                    <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm new password" required autocomplete="off" minlength="8">
                    <button type="button" class="password-toggle" data-target="confirmPassword" aria-label="Show password" aria-pressed="false">
                        <i class="fas fa-eye" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn" id="submitBtn">Update password</button>
        </form>
        <div class="back-link"><a href="index.html">Back to home</a></div>
    </div>
    <script>
        function apiOrigin() {
            if (location.protocol === 'file:') return 'http://localhost:3001';
            const h = location.hostname;
            if ((h === 'localhost' || h === '127.0.0.1') && location.port && location.port !== '3001') {
                return 'http://localhost:3001';
            }
            return '';
        }

        const pwdRe = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]/;
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        const errEl = document.getElementById('errorMessage');
        const okEl = document.getElementById('successMessage');
        const form = document.getElementById('customerResetPasswordForm');

        if (!token) {
            errEl.textContent = 'Invalid or missing reset link. Open the link from your email, or request a new reset from Sign in → Forgot password.';
            errEl.style.display = 'block';
            form.style.display = 'none';
        }

        document.querySelectorAll('.password-toggle').forEach((btn) => {
            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.dataset.target);
                if (!input) return;
                const icon = btn.querySelector('i');
                const show = input.type === 'password';
                input.type = show ? 'text' : 'password';
                icon.classList.toggle('fa-eye', !show);
                icon.classList.toggle('fa-eye-slash', show);
                btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
                btn.setAttribute('aria-pressed', show ? 'true' : 'false');
            });
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            errEl.style.display = 'none';
            okEl.style.display = 'none';

            if (newPassword !== confirmPassword) {
                errEl.textContent = 'Passwords do not match.';
                errEl.style.display = 'block';
                return;
            }
            if (newPassword.length < 8 || !pwdRe.test(newPassword)) {
                errEl.textContent = 'Password must meet the strength rules shown above.';
                errEl.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            const prev = submitBtn.textContent;
            submitBtn.textContent = 'Saving…';
            try {
                const res = await fetch(apiOrigin() + '/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                let data = {};
                try {
                    data = await res.json();
                } catch (_) {}
                if (res.ok) {
                    okEl.textContent = data.message || 'Password updated. You can sign in now.';
                    okEl.style.display = 'block';
                    form.style.display = 'none';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2500);
                } else {
                    errEl.textContent = data.error || 'Could not reset password. The link may have expired.';
                    errEl.style.display = 'block';
                }
            } catch (_) {
                errEl.textContent = 'Could not reach the server. Check your connection and try again.';
                errEl.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = prev;
            }
        });
    </script>
</body>
</html>
